apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app: db
spec:
  selector:
    app: db
  ports:
    - protocol: TCP
      port: {{ .Values.db.servicePort }}
      targetPort: {{ .Values.db.servicePort }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app
spec:
  selector:
    app: {{ .Release.Name }}-app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.app.ports.http }}
      targetPort: {{ .Values.app.ports.http }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.app.nodePorts.http }}
      {{- end }}
    - name: metrics
      protocol: TCP
      port: {{ .Values.app.ports.metrics }}
      targetPort: {{ .Values.app.ports.metrics }}
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.app.nodePorts.metrics }}
      {{- end }}
  type: {{ .Values.service.type }}