apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.db.pvc.name | default "postgres-pvc" }}
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.pvc.storage | default "2Gi" | quote }}
  storageClassName: {{ .Values.db.pvc.storageClass | default "standard" | quote }}